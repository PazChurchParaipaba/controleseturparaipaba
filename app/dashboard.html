<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SETUR Paraipaba - Dashboard</title>
    <link rel="stylesheet" href="./src/style.css" />
    <link rel="stylesheet" href="./src/dashboard.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="dashboard-body">
    
    <div class="dashboard-layout">
      <!-- Sidebar -->
      <aside class="sidebar glass-panel">
        <div class="sidebar-header">
          <img src="/image.png" alt="SETUR Logo" class="sidebar-logo" onerror="this.src='https://via.placeholder.com/50?text=S'" />
          <div>
            <h2 class="text-gradient" style="font-size: 1.1rem;">SETUR Paraipaba</h2>
            <p style="font-size: 0.75rem; color: var(--text-muted);">Gestão Interna</p>
          </div>
        </div>

        <nav class="sidebar-nav">
          <button class="nav-item active" data-target="dispensas">
            <i data-lucide="folder-open"></i> Dispensas
          </button>
          <button class="nav-item" data-target="agenda">
            <i data-lucide="calendar"></i> Agenda
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="user-info" id="user-info">
            <div class="avatar"><i data-lucide="user"></i></div>
            <span id="user-name" class="truncate">Carregando...</span>
          </div>
          <button class="nav-item text-danger" id="logout-btn">
            <i data-lucide="log-out"></i> Sair
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <header class="topbar">
          <h1 id="page-title">Dispensas de Licença</h1>
        </header>

        <div class="content-area" id="content-area">
          <!-- Dispensas Module -->
          <div id="module-dispensas" class="module active">
            <div class="module-header">
              <div class="search-box">
                <i data-lucide="search"></i>
                <input type="text" id="search-dispensas" placeholder="Buscar dispensas..." class="form-control" />
              </div>
              <button class="btn btn-primary" id="btn-nova-dispensa">
                <i data-lucide="plus"></i> Nova Dispensa
              </button>
            </div>
            
            <div class="glass-panel mt-1">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Data</th>
                    <th>Título</th>
                    <th>Arquivos</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="dispensas-list">
                  <tr><td colspan="4" class="text-center">Carregando...</td></tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- Agenda Module -->
          <div id="module-agenda" class="module hidden">
            <div class="module-header">
              <h2 style="font-size: 1.2rem;">Próximos Compromissos</h2>
              <button class="btn btn-primary" id="btn-novo-compromisso">
                <i data-lucide="plus"></i> Agendar
              </button>
            </div>
            
            <div class="glass-panel mt-1 p-2">
              <div id="agenda-list" class="agenda-grid">
                <p class="text-center text-muted">Carregando...</p>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Modal Nova Dispensa -->
    <div class="modal-overlay" id="modal-dispensa">
      <div class="modal-content glass-panel">
        <div class="modal-header">
          <h2>Nova Dispensa</h2>
          <button class="btn-icon" id="close-modal-dispensa"><i data-lucide="x"></i></button>
        </div>
        <form id="form-dispensa">
          <div class="form-group">
            <label>Título da Dispensa</label>
            <input type="text" id="dispensa-titulo" class="form-control" required placeholder="Ex: Construção Hotel X" />
          </div>
          <div class="form-group">
            <label>Pasta no Storage (Ex: 2024/Maio/HotelX)</label>
            <input type="text" id="dispensa-pasta" class="form-control" required placeholder="Pasta para organizar os arquivos" />
          </div>
          <div class="form-group">
            <label>Arquivos (PDF, Word, etc)</label>
            <input type="file" id="dispensa-arquivos" class="form-control" multiple required />
            <small class="text-muted" style="display:block; margin-top:5px;">Você pode selecionar múltiplos arquivos.</small>
          </div>
          
          <div id="upload-progress" class="hidden" style="margin-bottom: 15px;">
            <p style="font-size: 0.85rem; margin-bottom: 5px;">Fazendo upload...</p>
            <div style="width: 100%; background: var(--surface-border); height: 8px; border-radius: 4px; overflow: hidden;">
              <div id="progress-bar" style="width: 0%; height: 100%; background: var(--primary); transition: width 0.3s;"></div>
            </div>
          </div>

          <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
            <button type="button" class="btn btn-secondary" id="cancel-dispensa">Cancelar</button>
            <button type="submit" class="btn btn-primary" id="save-dispensa">Salvar e Enviar Arquivos</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Modal Nova Agenda -->
    <div class="modal-overlay" id="modal-agenda">
      <div class="modal-content glass-panel">
        <div class="modal-header">
          <h2>Novo Compromisso</h2>
          <button class="btn-icon" id="close-modal-agenda"><i data-lucide="x"></i></button>
        </div>
        <form id="form-agenda">
          <div class="form-group">
            <label>Título do Compromisso</label>
            <input type="text" id="agenda-titulo" class="form-control" required placeholder="Ex: Reunião com Fornecedores" />
          </div>
          <div class="form-group">
            <label>Secretaria</label>
            <select id="agenda-categoria" class="form-control" required>
              <option value="Turismo">Turismo</option>
              <option value="Meio Ambiente">Meio Ambiente</option>
            </select>
          </div>
          <div class="form-group">
            <label>Descrição (Opcional)</label>
            <textarea id="agenda-descricao" class="form-control" rows="3" placeholder="Detalhes do compromisso..."></textarea>
          </div>
          <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
              <label>Data/Hora Início</label>
              <input type="datetime-local" id="agenda-inicio" class="form-control" required />
            </div>
            <div class="form-group" style="flex: 1;">
              <label>Data/Hora Fim</label>
              <input type="datetime-local" id="agenda-fim" class="form-control" />
            </div>
          </div>
          <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
            <button type="button" class="btn btn-secondary" id="cancel-agenda">Cancelar</button>
            <button type="submit" class="btn btn-primary" id="save-agenda">Agendar</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Modal View Files -->
    <div class="modal-overlay" id="modal-files">
      <div class="modal-content glass-panel">
        <div class="modal-header">
          <h2>Arquivos Anexados</h2>
          <button class="btn-icon" id="close-modal-files"><i data-lucide="x"></i></button>
        </div>
        <div id="files-list" style="max-height: 300px; overflow-y: auto;">
          <p class="text-center text-muted">Carregando...</p>
        </div>
      </div>
    </div>

    <script type="module" src="/src/dashboard.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
